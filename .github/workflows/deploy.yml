name: Deploy to CapRover

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Package and deploy backend
        run: |
          tar -czf /tmp/backend.tar.gz -C backend .
          caprover deploy \
            --caproverUrl ${{ secrets.CAPROVER_SERVER_URL }} \
            --caproverPassword ${{ secrets.CAPROVER_PASSWORD }} \
            --appName repos-backend \
            --tarFile /tmp/backend.tar.gz

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Package and deploy frontend
        run: |
          tar -czf /tmp/frontend.tar.gz -C frontend .
          caprover deploy \
            --caproverUrl ${{ secrets.CAPROVER_SERVER_URL }} \
            --caproverPassword ${{ secrets.CAPROVER_PASSWORD }} \
            --appName repos-frontend \
            --tarFile /tmp/frontend.tar.gz
