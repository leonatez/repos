# docker-compose.yml — Local PostgreSQL for DATABASE=internal_db
#
# Usage:
#   docker compose up -d db          # start local PostgreSQL
#   docker compose down              # stop and remove containers
#   docker compose down -v           # also remove the pgdata volume (wipes DB)
#
# After starting, initialize the schema:
#   psql $INTERNAL_DB_URL -f database/local_schema.sql
#
# Optionally migrate existing Supabase data:
#   cd backend && python -m scripts.sync_from_supabase

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: repos_user
      POSTGRES_PASSWORD: change_me_in_production
      POSTGRES_DB: repos_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed externally — app connects via host network
    # If running the backend in Docker too, use the service name "db" as host
    ports:
      - "127.0.0.1:5432:5432"   # only localhost, not 0.0.0.0

volumes:
  pgdata:
