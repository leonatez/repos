server {
    listen 1112;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container (CapRover internal DNS)
    # Use Docker's embedded DNS resolver so the hostname is resolved at request
    # time rather than at nginx startup (prevents crash if backend isn't up yet).
    location /api {
        resolver 127.0.0.11 valid=30s;
        set $backend http://srv-captain--repos-api:1111;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
